# Infrastructure Host Configuration
INFRA_HOST: 100.72.208.15

#mongo
MONGODB_CONNECTION_URL: ${MONGODB_URL:mongodb://admin:password123@${INFRA_HOST}:27017/portfolio?authSource=admin}

#Kafka
PROJ_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:${INFRA_HOST}:9092}
PROJ_KAFKA_USERNAME: ${KAFKA_USERNAME:admin}
PROJ_KAFKA_PASSWORD: ${KAFKA_PASSWORD:password123}
PROJ_KAFKA_JAAS_CONFIG: ${KAFKA_JAAS_CONFIG:org.apache.kafka.common.security.plain.PlainLoginModule required username="${PROJ_KAFKA_USERNAME}" password="${PROJ_KAFKA_PASSWORD}";}
PROJ_KAFKA_SECURITY_PROTOCOL: ${KAFKA_SECURITY_PROTOCOL:SASL_PLAINTEXT}
PROJ_KAFKA_SASL_MECHANISM: ${KAFKA_SASL_MECHANISM:PLAIN}

#Topic
PORTFOLIO_CONSUMER_GROUP: ${PORTFOLIO_CONSUMER_ID:am-portfolio-group-1}
PORTFOLIO_TOPIC_NAME: ${PORTFOLIO_TOPIC:am-portfolio}
STOCK_CONSUMER_GROUP: ${STOCK_CONSUMER_ID:am-stock-group.v2}
STOCK_TOPIC_NAME: ${STOCK_TOPIC:am-stock-price-update}
MARKET_INDEX_CONSUMER_GROUP: ${MARKET_INDEX_CONSUMER_ID:am-market-index-group-1}
MARKET_INDEX_TOPIC_NAME: ${MARKET_INDEX_TOPIC:nse-stock-indices-update}

#Redis
PROJ_REDIS_HOSTNAME: ${REDIS_HOSTNAME:${INFRA_HOST}}
PROJ_REDIS_PORT: ${REDIS_PORT:6379}
PROJ_REDIS_PASSWORD: ${REDIS_PASSWORD:password123}

spring:
  application:
    name: portfolio-app
  profiles:
    include:
      - api
  kafka:
    bootstrap-servers: ${PROJ_KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: ${PORTFOLIO_CONSUMER_GROUP}
      auto-offset-reset: latest
      enable-auto-commit: false
      max-poll-records: 100
    properties:
      security-protocol: ${PROJ_KAFKA_SECURITY_PROTOCOL}
      sasl-mechanism: ${PROJ_KAFKA_SASL_MECHANISM}
      sasl-jaas-config: ${PROJ_KAFKA_JAAS_CONFIG}
      ssl-endpoint-identification-algorithm: ""
      ssl-truststore-location: /etc/ssl/certs/java/cacerts
      ssl-truststore-password: changeit
  data:
    redis:
      host: ${PROJ_REDIS_HOSTNAME}
      port: ${PROJ_REDIS_PORT}
      password: ${PROJ_REDIS_PASSWORD}
      portfolio-mover:
        ttl: 900 # 15 minutes in seconds
        key-prefix: "portfolio:analysis:"
      portfolio-summary:
        ttl: 900 # 15 minutes in seconds
        key-prefix: "portfolio:summary:"
      portfolio-holdings:
        ttl: 900 # 15 minutes in seconds
        key-prefix: "portfolio:holdings:"
      market-indices:
        ttl: 129600 # 30 Days in seconds
        key-prefix: "market-indices:indices:"
        historical:
          key-prefix: "market-indices:historical-indices:"
          ttl: 129600 # 30 Days in seconds
      stock:
        ttl: 129600 # 30 Days in seconds
        key-prefix: "stock:price:"
        historical:
          key-prefix: "stock:historical-price:"
          ttl: 129600 # 30 Days in seconds
      stock-indices:
        ttl: 129600 # 30 Days in seconds
        key-prefix: "stock-indices:data:"
        historical:
          key-prefix: "stock-indices:historical-data:"
          ttl: 129600 # 30 Days in seconds
    mongodb:
      uri: ${MONGODB_CONNECTION_URL}
      authentication-database: admin
  # Disable JDBC auto-configuration since we're using MongoDB
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

nse:
  broad-market-indices:
    - NIFTY 50
    - NIFTY NEXT 50
    - NIFTY MIDCAP 50
    - NIFTY MIDCAP 100
    - NIFTY MIDCAP 150
    - NIFTY MIDCAP 250
    - NIFTY MIDCAP 500
    - NIFTY SMLCAP 100
    - NIFTY SMLCAP 250
    - NIFTY SMLCAP 500
  sector-indices:
    - NIFTY BANK
    - NIFTY IT
    - NIFTY PHARMA
    - NIFTY AUTO
    - NIFTY METAL
    - NIFTY ENERGY
    - NIFTY FMCG
    - NIFTY MEDIA
    - NIFTY REALTY
    - NIFTY PSU BANK

app:
  jwt:
    internal-secret: ${INTERNAL_JWT_SECRET:internal-service-super-secret-key-32chars-minimum-change-in-prod}
    secret: ${JWT_SECRET:internal-service-super-secret-key-32chars-minimum-change-in-prod}
    algorithm: ${JWT_ALGORITHM:HS256}
  kafka:
    portfolio:
      consumer:
        id: ${PORTFOLIO_CONSUMER_GROUP}
        enabled: false
      topic: ${PORTFOLIO_TOPIC_NAME}
    stock:
      consumer:
        id: ${STOCK_CONSUMER_GROUP}
        enabled: false
      topic: ${STOCK_TOPIC_NAME}
    market-index:
      consumer:
        id: ${MARKET_INDEX_CONSUMER_GROUP}
        enabled: false
      topic: ${MARKET_INDEX_TOPIC_NAME}

server:
  port: 8080
  servlet:
    context-path: /
  tomcat:
    max-threads: 20
    min-spare-threads: 10
    max-connections: 200

etf:
  url: ${ETF_API_URL:http://localhost:8022}

market-data:
  api:
    base-url: http://localhost:8093
    ohlc-endpoint: /v1/market-data/ohlc
    historical-data-endpoint: /v1/market-data/historical-data
    securities-endpoint: /v1/securities

# OpenAPI Documentation
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

logging:
  level:
    "[com.portfolio]": INFO
    "[com.portfolio.analytics]": INFO
    "[com.portfolio.api]": INFO
    "[com.portfolio.marketdata]": INFO
    "[com.portfolio.model]": INFO
    "[com.am.common]": INFO
    "[com.am.common.amcommondata]": INFO
    org.springframework.kafka: INFO
