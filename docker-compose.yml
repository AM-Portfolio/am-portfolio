version: '3.8'


services:
  am-portfolio-service:
    container_name: am-portfolio-service
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
        - .env
    environment:
      # Infrastructure
      INFRA_HOST: ${INFRA_HOST}

      # Application Configuration
      AM_MARKET_DATA_API_URL: ${AM_MARKET_DATA_API_URL}

      # Kafka Configuration
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}

      # Spring Profile
      SPRING_PROFILES_ACTIVE: docker

      # MongoDB Configuration
      MONGODB_URL: ${MONGODB_URL}
      MONGODB_DATABASE: ${MONGODB_DATABASE}
      MONGODB_USERNAME: ${MONGODB_USERNAME}
      MONGODB_PASSWORD: ${MONGODB_PASSWORD}
      MONGODB_AUTHENTICATION_DATABASE: admin

      # Redis Configuration
      REDIS_HOSTNAME: ${REDIS_HOSTNAME}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_PORT: ${REDIS_PORT}

      # JWT Configuration
      INTERNAL_JWT_SECRET: ${INTERNAL_JWT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}

      # Distributed Tracing — forward spans to the shared otel-collector (am-infra stack)
      # The "docker" Spring profile enables JSON structured logging (logback-spring.xml)
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-http://otel-collector:4318/v1/traces}

      # ETF / Basket API — points to the market service on the shared am-infra gateway.
      # Fallback to production gateway URL if env var is not set in .env
      ETF_API_URL: ${ETF_API_URL:-https://am.asrax.in/market}

    entrypoint: ["/bin/sh", "-c"]
    command: 
      - |
        echo "=== AM Portfolio Service Environment Variables ==="
        echo "Database URL: $${SPRING_DATASOURCE_URL}"
        echo "Database User: $${SPRING_DATASOURCE_USERNAME}"
        echo "Kafka Servers: $${SPRING_KAFKA_BOOTSTRAP_SERVERS}"
        echo "Kafka Group: $${SPRING_KAFKA_CONSUMER_GROUP_ID}"
        echo "Max Retries: $${AM_PORTFOLIO_MAX_RETRIES}"
        echo "=== Starting AM Portfolio Service ==="
        java -jar app.jar
    ports:
      - "8072:8080"
    networks:
      - am-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
  influxdb_data:
  grafana_data:

networks:
  am-net:
    external: true
    name: am-infra_am-net
