version: '3.8'

services:
  am-portfolio-service:
    # OVERRIDE: Map the locally built JAR directly into the container.
    # This skips the need to 'docker build' when code changes.
    # Workflow: 
    # 1. Run 'mvn package -DskipTests' in Dev Container
    # 2. Run 'docker-compose restart am-portfolio-service'
    image: eclipse-temurin:17-jre-jammy
    container_name: am-portfolio-dev
    ports:
      - "8072:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker,api
      - KAFKA_ENABLED=false
      - APP_KAFKA_ENABLED=false
      - APP_KAFKA_PORTFOLIO_CONSUMER_ENABLED=false
      - SPRING_KAFKA_LISTENER_AUTO_STARTUP=false
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_SECURITY_PROTOCOL=PLAINTEXT
      - KAFKA_JAAS_CONFIG=
      - KAFKA_USERNAME=
      - KAFKA_PASSWORD=
      - MONGODB_URL=mongodb://admin:password123@infra-mongo:27017/portfolio?authSource=admin
      - REDIS_HOSTNAME=infra-redis
      - REDIS_PASSWORD=
      - MARKET_DATA_API_URL=http://host.docker.internal:8092
      - ETF_API_URL=http://host.docker.internal:8022
    volumes:
      - ./portfolio-app/target/portfolio-app-1.0.1-SNAPSHOT.jar:/app/app.jar
    command: ["java", "-jar", "/app/app.jar", "--app.kafka.enabled=true", "--app.kafka.portfolio.consumer.enabled=true", "--spring.kafka.listener.auto-startup=true", "--management.endpoints.web.exposure.include=*"]
    networks:
      - am-net
    restart: unless-stopped

networks:
  am-net:
    external: true
    name: am-infra_am-net
