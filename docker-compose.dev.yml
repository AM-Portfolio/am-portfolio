version: '3.8'

services:
  am-portfolio-service:
    # OVERRIDE: Map the locally built JAR directly into the container.
    # This skips the need to 'docker build' when code changes.
    # Workflow: 
    # 1. Run 'mvn package -DskipTests' in Dev Container
    # 2. Run 'docker-compose restart am-portfolio-service'
    image: eclipse-temurin:17-jre-jammy
    container_name: am-portfolio-dev
    ports:
      - "8072:8080"
    volumes:
      - ./portfolio-app/target/portfolio-app-1.0-SNAPSHOT.jar:/app/app.jar
    command: ["java", "-jar", "/app/app.jar"]
    networks:
      - am-net
    restart: unless-stopped

networks:
  am-net:
    external: true
    name: am-infra_am-net
