# Dev Environment Overrides — am-portfolio
# Registers am-portfolio on https://am-dev.asrax.in/portfolio/* via Traefik.
environment: dev


# Dev Vault secret paths — key mappings are in vault-mappings.yaml
vault:
  secretPaths:
    auth:
      path: apps/data/dev/services/am-auth
    infra:
      path: apps/data/dev/infra/postgres
    portfolio:
      path: apps/data/dev/services/am-portfolio
    parser:
      path: apps/data/dev/services/am-parser
    logging:
      path: apps/data/dev/services/logging
    market:
      path: apps/data/dev/services/am-market-data
    mongodb:
      path: apps/data/dev/infra/mongodb
    kafka:
      path: apps/data/dev/infra/kafka
    redis:
      path: apps/data/dev/infra/redis
    identity-oidc:
      path: apps/data/dev/services/am-identity
    service-oauth:
      path: apps/data/dev/services/am-portfolio

# Hostnames that resolve to the shared dev VPS (203.174.22.129).
hostAliases:
  - ip: "203.174.22.129"
    hostnames:
      - "redis.asrax.in"
      - "mongodb.asrax.in"
      - "kafka.asrax.in"

ingress:
  enabled: true
  className: "traefik"
  annotations:
    kubernetes.io/ingress.class: "traefik"
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.middlewares: >-
      am-apps-dev-dev-global-cors@kubernetescrd,
      am-apps-dev-dev-strip-prefix@kubernetescrd
  hosts:
    - host: am-dev.asrax.in
      paths:
        - path: /portfolio
          pathType: Prefix

env:
  SPRING_PROFILES_ACTIVE: "dev,security"
