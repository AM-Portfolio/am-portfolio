# am-portfolio Preprod Overrides

replicaCount: 1

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

# Non-secret runtime env (mirrors am-analysis preprod pattern).
# Secrets are still injected via Vault per vault.secretPaths below.
env:
  SPRING_PROFILES_ACTIVE: "preprod"
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "http://otel-collector.monitoring.svc.cluster.local:4318/v1/traces"
  TRACING_SAMPLING_PROBABILITY: "0.1"

vault:
  secretPaths:
    auth:
      path: apps/data/preprod/services/am-auth
    infra:
      path: apps/data/preprod/infra/postgres
    portfolio:
      path: apps/data/preprod/services/am-portfolio

ingress:
  hosts:
    - host: portfolio.preprod.am-portfolio.com
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: portfolio-tls
      hosts:
        - portfolio.preprod.am-portfolio.com
