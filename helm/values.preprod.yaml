# Preprod Environment Overrides — am-portfolio
environment: preprod

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

# Preprod Vault secret paths — key mappings are in vault-mappings.yaml
vault:
  secretPaths:
    auth:
      path: apps/data/preprod/services/am-auth
    infra:
      path: apps/data/preprod/infra/postgres
    portfolio:
      path: apps/data/preprod/services/am-portfolio
    parser:
      path: apps/data/preprod/services/am-parser
    logging:
      path: apps/data/preprod/services/logging
    market:
      path: apps/data/preprod/services/am-market-data
    mongodb:
      path: apps/data/preprod/infra/mongodb
    kafka:
      path: apps/data/preprod/infra/kafka
    redis:
      path: apps/data/preprod/infra/redis

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: portfolio.preprod.am-portfolio.com
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: portfolio-tls
      hosts:
        - portfolio.preprod.am-portfolio.com

env:
  SPRING_PROFILES_ACTIVE: "preprod"
