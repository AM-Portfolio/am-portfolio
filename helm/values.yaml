# am-portfolio Universal Chart Values

replicaCount: 1
port: 8080
language: java
environment: preprod

# Top-level service account (Fallback)
serviceAccountName: am-backend-sa

global:
  image:
    registry: ghcr.io/am-portfolio
    pullPolicy: Always
  # Global vault settings
  vault:
    enabled: true
    role: "am-backend-role"
    serviceAccountName: "am-backend-sa"

image:
  repository: am-portfolio
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080

security:
  automountServiceAccountToken: true

# Vault Secret Injection Configuration
# Secret paths and key mappings are defined in vault-mappings.yaml
vault:
  enabled: true
  serviceAccountName: am-backend-sa
  role: am-backend-role

env:
  SPRING_PROFILES_ACTIVE: "preprod"
  KAFKA_ENABLED: "true"
  KAFKA_SECURITY_PROTOCOL: "SASL_PLAINTEXT"
  KAFKA_SASL_MECHANISM: "SCRAM-SHA-256"
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "http://otel-collector.monitoring.svc.cluster.local:4318/v1/traces"
  TRACING_SAMPLING_PROBABILITY: "0.1"

probes:
  port: 8080
  liveness:
    path: /actuator/health/liveness
    initialDelaySeconds: 150
    periodSeconds: 15
  readiness:
    path: /actuator/health/readiness
    initialDelaySeconds: 150
    periodSeconds: 15

resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 500m
    memory: 512Mi

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: portfolio.preprod.am-portfolio.com
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: portfolio-tls
      hosts:
        - portfolio.preprod.am-portfolio.com

# Config block required by universal-chart templates.
# batchSearch is not used by am-portfolio — disabled to prevent nil pointer
# in universal-chart templates (matches am-trade-management pattern).
config:
  batchSearch:
    enabled: false
