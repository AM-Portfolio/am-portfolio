# am-portfolio Universal Chart Values

replicaCount: 1
language: java
environment: preprod

# Top-level service account (Fallback)
serviceAccountName: am-backend-sa

global:
  image:
    registry: ghcr.io/am-portfolio
    pullPolicy: Always
  # Global vault settings
  vault:
    enabled: true
    role: "am-backend-role"
    serviceAccountName: "am-backend-sa"

image:
  repository: am-portfolio
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080

security:
  automountServiceAccountToken: true

# Vault Secret Injection Configuration
vault:
  enabled: true
  serviceAccountName: am-backend-sa
  role: am-backend-role
  secretPaths:
    auth:
      path: apps/data/preprod/services/am-auth
    portfolio:
      path: apps/data/preprod/services/am-portfolio
    mongodb:
      path: apps/data/preprod/infra/mongodb
    kafka:
      path: apps/data/preprod/infra/kafka
    redis:
      path: apps/data/preprod/infra/redis

env:
  MARKET_DATA_API_URL: "http://am-market-data:8092"
  ETF_API_URL: "http://am-parser:8022"
  SPRING_PROFILES_ACTIVE: "preprod"
  LOG_LEVEL: "INFO"

probes:
  port: 8080
  liveness:
    path: /actuator/health/liveness
    initialDelaySeconds: 150
    periodSeconds: 15
  readiness:
    path: /actuator/health/readiness
    initialDelaySeconds: 150
    periodSeconds: 15

resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 500m
    memory: 512Mi

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: portfolio.preprod.am-portfolio.com
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: portfolio-tls
      hosts:
        - portfolio.preprod.am-portfolio.com
