# am-portfolio Universal Chart Values

replicaCount: 1
port: 8080
language: java

# Top-level service account (Fallback)
serviceAccountName: am-backend-sa

global:
  image:
    registry: ghcr.io/am-portfolio
    pullPolicy: Always
  # Global vault settings
  vault:
    enabled: true
    role: "am-backend-role"
    serviceAccountName: "am-backend-sa"

image:
  repository: am-portfolio
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080

security:
  automountServiceAccountToken: true

# Vault Secret Injection Configuration
vault:
  enabled: true
  serviceAccountName: am-backend-sa
  role: am-backend-role

env:
  SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: "true"
  KAFKA_ENABLED: "true"
  KAFKA_SECURITY_PROTOCOL: "SASL_PLAINTEXT"
  KAFKA_SASL_MECHANISM: "SCRAM-SHA-256"
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "http://otel-collector.monitoring.svc.cluster.local:4318/v1/traces"
  TRACING_SAMPLING_PROBABILITY: "0.1"

probes:
  port: 8080
  startup:
    path: "/actuator/health/liveness"
    failureThreshold: 60
    periodSeconds: 10
  liveness:
    path: /actuator/health/liveness
    initialDelaySeconds: 150
    periodSeconds: 15
  readiness:
    path: /actuator/health/readiness
    initialDelaySeconds: 150
    periodSeconds: 15

resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 500m
    memory: 512Mi

# Config block required by universal-chart templates.
config:
  batchSearch:
    enabled: false
