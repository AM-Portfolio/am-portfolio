# am-portfolio Universal Chart Values

replicaCount: 1

image:
  repository: am-portfolio
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080

security:
  automountServiceAccountToken: true

# Vault Secret Injection Configuration
vault:
  enabled: true
  serviceAccountName: am-backend-sa
  role: am-backend-role
  secretPaths:
    auth: apps/data/preprod/services/am-auth
    portfolio: apps/data/preprod/services/am-portfolio
    mongodb: apps/data/preprod/infra/mongodb
    kafka: apps/data/preprod/infra/kafka
    redis: apps/data/preprod/infra/redis
  
  # Template to export secrets as environment variables
  template: |
    {{- with secret "apps/data/preprod/services/am-portfolio" -}}
    export PORTFOLIO_TOPIC="{{ .Data.data.PORTFOLIO_TOPIC }}"
    {{- end }}
    {{- with secret "apps/data/preprod/services/am-auth" -}}
    export JWT_SECRET="{{ .Data.data.JWT_SECRET_KEY }}"
    export INTERNAL_JWT_SECRET="{{ .Data.data.JWT_SECRET_KEY }}"
    {{- end }}
    {{- with secret "apps/data/preprod/infra/mongodb" -}}
    export MONGODB_URL="{{ .Data.data.url }}"
    {{- end }}
    {{- with secret "apps/data/preprod/infra/kafka" -}}
    export KAFKA_BOOTSTRAP_SERVERS="{{ .Data.data.bootstrap_servers }}"
    export KAFKA_USERNAME="{{ .Data.data.username }}"
    export KAFKA_PASSWORD="{{ .Data.data.password }}"
    export KAFKA_SECURITY_PROTOCOL="SASL_PLAINTEXT"
    export KAFKA_SASL_MECHANISM="SCRAM-SHA-256"
    {{- end }}
    {{- with secret "apps/data/preprod/infra/redis" -}}
    export REDIS_HOSTNAME="{{ .Data.data.host }}"
    export REDIS_PORT="{{ .Data.data.port }}"
    export REDIS_PASSWORD="{{ .Data.data.password }}"
    {{- end }}

env:
  MARKET_DATA_API_URL: "http://am-market-data:8092"
  ETF_API_URL: "http://am-parser:8022"
  SPRING_PROFILES_ACTIVE: "preprod"
  LOG_LEVEL: "INFO"

resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8080
  initialDelaySeconds: 60
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: 8080
  initialDelaySeconds: 60
  periodSeconds: 10

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: portfolio.preprod.am-portfolio.com
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: portfolio-tls
      hosts:
        - portfolio.preprod.am-portfolio.com
