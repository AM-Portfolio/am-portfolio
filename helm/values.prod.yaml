# am-portfolio Production Overrides

replicaCount: 2

resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 500m
    memory: 512Mi

vault:
  secretPaths:
    auth:
      path: apps/data/prod/services/am-auth
    infra:
      path: apps/data/prod/infra/postgres
    portfolio:
      path: apps/data/prod/services/am-portfolio

ingress:
  hosts:
    - host: portfolio.am-portfolio.com
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls:
    - secretName: portfolio-tls-prod
      hosts:
        - portfolio.am-portfolio.com
