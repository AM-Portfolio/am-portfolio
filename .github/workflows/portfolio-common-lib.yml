name: Portfolio Common Lib Publish

on:
  push:
    branches: ["main", "develop", "test/**"]
    paths:
      - "am-common-data/**"
  pull_request:
    branches: ["main", "develop", "test/**"]
    paths:
      - "am-common-data/**"
  workflow_dispatch:

jobs:
  publish:
    name: Publish Common Data Lib
    permissions:
      contents: write
      packages: write
    uses: AM-Portfolio/am-pipelines/.github/workflows/publish-library.yml@main
    with:
      language: "java"
      working_directory: "am-common-data"
      sdk_name: "am-common-data-lib"
      maven_repo_id: "github"
      maven_repo_url: "https://maven.pkg.github.com/AM-Portfolio/am-portfolio"
      use_release_version: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
      advance_snapshot: true
      action: ${{ (github.event_name == 'pull_request' || contains(github.event.head_commit.message, 'bump version to next snapshot version')) && 'verify' || 'publish' }}
    secrets: inherit
