name: Manual Deploy (Portfolio)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Select Image Tag"
        required: true
        default: "latest"
        type: choice
        options:
          - latest
          - custom
      custom_tag:
        description: "If 'custom' selected, enter tag here"
        required: false
        type: string
      environment:
        description: "Target Environment"
        required: true
        default: "preprod"
        type: choice
        options:
          - preprod
          - prod

jobs:
  deploy:
    name: Deploy Portfolio to ${{ github.event.inputs.environment }}
    uses: AM-Portfolio/am-pipelines/.github/workflows/central-deploy.yml@develop
    with:
      service_name: 'am-portfolio'
      working_directory: './'
      language: 'python'
      environment: ${{ github.event.inputs.environment }}
      image_tag: ${{ github.event.inputs.image_tag == 'custom' && github.event.inputs.custom_tag || github.event.inputs.image_tag }}
      namespace: ${{ github.event.inputs.environment == 'prod' && 'am-apps-prod' || 'am-apps-preprod' }}
    secrets: inherit
